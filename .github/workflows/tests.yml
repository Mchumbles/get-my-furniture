name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env.testing file
        run: |
          cp .env.testing.ci .env.testing  # Copy the non-sensitive configuration

          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.testing

          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env.testing

      - name: Run test suite
        run: |
          php artisan test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: get_my_furniture_testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

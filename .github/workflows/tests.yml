name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env.testing file
        run: |
          echo "APP_ENV=testing" > .env.testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env.testing
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env.testing
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.testing

      - name: Run Tests
        run: ./vendor/bin/phpunit
